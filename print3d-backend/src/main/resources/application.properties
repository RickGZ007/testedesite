server.port=${PORT:8080}

# ── Banco H2 (dev local) ──────────────────────────────────────────
# Em produção no Railway, apague este bloco e use as variáveis
# de ambiente do MySQL/Postgres que o Railway fornece.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/print3ddb;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

# ── Cloudinary ────────────────────────────────────────────────────
# Preencha no Railway em: Settings → Variables
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:SEU_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY:SUA_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:SEU_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER:print3d}

# ── Upload ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ──────────────────────────────────────────────────────────
# Adicione a URL do Netlify separada por vírgula após o deploy
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:4173}

# ── Outros ───────────────────────────────────────────────────────
spring.jpa.open-in-view=false
